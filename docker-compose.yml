services:
  wyoming-sensevoice:
    image: wyoming-sensevoice
    build: .
    restart: unless-stopped
    ports:
      - "10300:10300"
    volumes:
      - ./models:/models
    environment:
      SENSEVOICE_MODEL_NAME: iic/SenseVoiceSmall
      SENSEVOICE_DEVICE: cpu      # change to "cuda" for GPU inference

  # One-shot service to download the model into ./models before first run.
  # Usage: docker compose run --rm download
  download:
    profiles:
      - download
    build: .
    volumes:
      - ./models:/models
    environment:
      SENSEVOICE_MODEL_NAME: iic/SenseVoiceSmall
    entrypoint: python3
    command: >
      -c "
      import os;
      from modelscope import snapshot_download;
      print('Downloading', os.environ['SENSEVOICE_MODEL_NAME'], '...');
      snapshot_download(os.environ['SENSEVOICE_MODEL_NAME'], cache_dir='/models/modelscope');
      print('Done.')
      "
